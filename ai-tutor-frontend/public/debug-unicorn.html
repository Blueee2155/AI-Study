<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独角兽调试工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        h2 { color: #666; font-size: 18px; margin-top: 0; }
        .info-item {
            margin: 10px 0;
            padding: 10px;
            background: #f9f9f9;
            border-left: 4px solid #4CAF50;
            font-family: monospace;
        }
        .warning {
            border-left-color: #ff9800;
            background: #fff3e0;
        }
        .error {
            border-left-color: #f44336;
            background: #ffebee;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover {
            background: #45a049;
        }
        button.danger {
            background: #f44336;
        }
        button.danger:hover {
            background: #da190b;
        }
        .log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1> 独角兽宠物调试工具</h1>
        <p>此工具用于检查和修复学习监控面板中独角兽不显示的问题。</p>
    </div>

    <div class="card">
        <h2>当前 localStorage 状态</h2>
        <div id="storage-info"></div>
    </div>

    <div class="card">
        <h2>操作</h2>
        <button onclick="clearUnicornCache()">清除独角兽位置缓存</button>
        <button onclick="clearAllStorage()" class="danger">清除所有 localStorage</button>
        <button onclick="forceReload()">强制刷新页面</button>
    </div>

    <div class="card">
        <h2>操作日志</h2>
        <div id="log" class="log">等待操作...</div>
    </div>

    <script>
        const logEl = document.getElementById('log');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'warning' ? '️' : '✅';
            logEl.textContent += `[${timestamp}] ${prefix} ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function displayStorageInfo() {
            const infoEl = document.getElementById('storage-info');
            infoEl.innerHTML = '';
            
            const keys = ['unicornPosition', 'unicornPanelPosition', 'token', 'user'];
            
            keys.forEach(key => {
                const value = localStorage.getItem(key);
                if (value) {
                    let displayValue = value;
                    try {
                        displayValue = JSON.stringify(JSON.parse(value), null, 2);
                    } catch {
                        // Keep as string
                    }
                    
                    const div = document.createElement('div');
                    div.className = `info-item ${key.includes('Position') ? 'warning' : ''}`;
                    div.innerHTML = `<strong>${key}:</strong><br/><pre style="margin: 5px 0;">${displayValue}</pre>`;
                    infoEl.appendChild(div);
                } else {
                    const div = document.createElement('div');
                    div.className = 'info-item';
                    div.innerHTML = `<strong>${key}:</strong> 不存在`;
                    infoEl.appendChild(div);
                }
            });
            
            log(`已显示 ${keys.length} 个存储项`);
        }

        function clearUnicornCache() {
            localStorage.removeItem('unicornPosition');
            localStorage.removeItem('unicornPanelPosition');
            log('已清除独角兽位置缓存（unicornPosition 和 unicornPanelPosition）');
            displayStorageInfo();
        }

        function clearAllStorage() {
            if (confirm('确定要清除所有 localStorage 数据吗？这将包括登录 token！')) {
                localStorage.clear();
                log('已清除所有 localStorage 数据', 'warning');
                displayStorageInfo();
            }
        }

        function forceReload() {
            log('正在强制刷新页面...');
            setTimeout(() => {
                window.location.reload(true);
            }, 500);
        }

        // Initialize
        displayStorageInfo();
        log('调试工具已加载');
    </script>
</body>
</html>
