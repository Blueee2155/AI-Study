<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清除缓存 - AI学习助手</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    button {
      background: #10b981;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: #059669;
      transform: translateY(-2px);
    }
    .success {
      display: none;
      color: #10b981;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🦄 清除独角兽位置缓存</h1>
    <p>如果您看不到监控面板中的独角兽宠物,请点击下方按钮清除缓存,然后刷新页面。</p>
    <button onclick="clearCache()">清除缓存并返回主页</button>
    <div class="success" id="successMsg">✅ 缓存已清除!正在跳转...</div>
  </div>

  <script>
    function clearCache() {
      // 清除独角兽位置缓存
      localStorage.removeItem('unicornPanelPosition');
      localStorage.removeItem('unicornPosition');
      
      // 显示成功消息
      document.getElementById('successMsg').style.display = 'block';
      
      // 1秒后跳转到主页
      setTimeout(() => {
        window.location.href = '/';
      }, 1000);
    }
  </script>
</body>
</html>
