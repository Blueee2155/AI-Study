<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8"><title>ECharts · Heatmap</title>
<link rel="stylesheet" href="../../assets/fonts.css">
<link rel="stylesheet" href="../../assets/base.css">
<link rel="stylesheet" id="theme-link" href="../../assets/themes/minimal-white.css">
<link rel="stylesheet" href="../../assets/animations/animations.css">
<!-- In generated decks use ./_shared/echarts.min.js -->
<script src="../../assets/echarts.min.js"></script>
<script src="../../assets/echarts-theme-sync.js"></script>
</head><body class="single">
<div class="deck"><section class="slide is-active" data-title="Heatmap chart">
  <p class="kicker">ECharts · 热力图</p>
  <h2 class="h2">团队工作热力分布</h2>
  <div class="card mt-l" style="height:560px;padding:28px"><div id="c" style="width:100%;height:100%"></div></div>
  <script>
    addEventListener('DOMContentLoaded', function () {
      var days = ['周一', '周二', '周三', '周四', '周五'];
      var hours = ['9:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00'];
      // [dayIndex, hourIndex, value]
      var data = [
        // 周一
        [0,0,4],[0,1,8],[0,2,9],[0,3,3],[0,4,2],[0,5,8],[0,6,9],[0,7,7],[0,8,5],[0,9,3],
        // 周二
        [1,0,5],[1,1,9],[1,2,10],[1,3,2],[1,4,3],[1,5,9],[1,6,8],[1,7,8],[1,8,6],[1,9,4],
        // 周三
        [2,0,3],[2,1,7],[2,2,9],[2,3,2],[2,4,1],[2,5,8],[2,6,10],[2,7,7],[2,8,5],[2,9,2],
        // 周四
        [3,0,5],[3,1,8],[3,2,10],[3,3,3],[3,4,2],[3,5,9],[3,6,9],[3,7,8],[3,8,6],[3,9,3],
        // 周五
        [4,0,4],[4,1,7],[4,2,8],[4,3,2],[4,4,1],[4,5,7],[4,6,8],[4,7,6],[4,8,4],[4,9,2]
      ];

      var chart = echarts.init(document.getElementById('c'), null, { renderer: 'svg' });
      window.__deckECharts.register(chart, function (c) {
        return {
          tooltip: {
            position: 'top',
            formatter: function (p) { return days[p.value[0]] + ' ' + hours[p.value[1]] + '<br/>工作量：' + p.value[2]; }
          },
          grid: { top: 30, bottom: 60, left: 80, right: 40 },
          xAxis: {
            type: 'category', data: days, splitArea: { show: true },
            axisLabel: { color: c['--text-2'] }, axisLine: { lineStyle: { color: c['--border'] } }
          },
          yAxis: {
            type: 'category', data: hours, splitArea: { show: true },
            axisLabel: { color: c['--text-2'] }, axisLine: { lineStyle: { color: c['--border'] } }
          },
          visualMap: {
            min: 0, max: 10, calculable: true, orient: 'horizontal',
            left: 'center', bottom: 4,
            inRange: { color: [c['--surface'] || '#f5f5f5', c['--accent']] },
            textStyle: { color: c['--text-2'] }
          },
          series: [{
            type: 'heatmap', data: data,
            label: { show: true, color: c['--text-1'], fontSize: 12 },
            itemStyle: { borderColor: c['--bg'] || '#fff', borderWidth: 2 },
            emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,.2)' } }
          }]
        };
      });
      window.addEventListener('resize', function () { chart.resize(); });
    });
  </script>
</section></div>
<script src="../../assets/runtime.js"></script>
</body></html>
