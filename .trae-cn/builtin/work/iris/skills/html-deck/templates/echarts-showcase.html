<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><title>ECharts Showcase — presentation</title>
<link rel="stylesheet" href="../assets/fonts.css">
<link rel="stylesheet" href="../assets/base.css">
<link rel="stylesheet" id="theme-link" href="../assets/themes/minimal-white.css">
<style>
*{box-sizing:border-box}
body{margin:0;overflow:hidden;background:var(--bg)}
.nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;
  padding:8px 20px;font-family:var(--font-mono);font-size:12px;color:var(--text-2);
  box-shadow:var(--shadow);display:flex;gap:14px;align-items:center}
.nav a{color:var(--text-2);text-decoration:none;padding:4px 10px;border-radius:999px;cursor:pointer}
.nav a:hover{background:var(--surface-2)}
.nav .label{min-width:200px;text-align:center}
.nav .type{font-weight:700;color:var(--accent)}
iframe{width:100%;height:100vh;border:0;display:block;background:var(--bg)}
.thumb-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(0,0,0,.04);backdrop-filter:blur(8px);
  display:flex;gap:2px;padding:6px 12px;overflow-x:auto;justify-content:center}
.thumb-bar button{flex:0 0 auto;padding:6px 14px;border:1px solid var(--border);
  border-radius:8px;background:var(--surface);cursor:pointer;
  font-family:var(--font-mono);font-size:11px;color:var(--text-2);transition:all .2s}
.thumb-bar button:hover{border-color:var(--accent);color:var(--accent)}
.thumb-bar button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>

<div class="nav">
  <a id="prev" title="上一个">←</a>
  <span class="label"><span class="type" id="type"></span> · <span id="idx"></span></span>
  <a id="next" title="下一个">→</a>
</div>

<iframe id="frame"></iframe>

<div class="thumb-bar" id="thumbs"></div>

<script>
const charts = [
  { file: 'chart-bar-echarts',   name: '柱状图 Bar',       icon: '📊' },
  { file: 'chart-line-echarts',  name: '折线图 Line',      icon: '📈' },
  { file: 'chart-pie-echarts',   name: '饼图 Pie',         icon: '🥧' },
  { file: 'chart-radar-echarts', name: '雷达图 Radar',     icon: '🎯' },
  { file: 'chart-sankey',        name: '桑基图 Sankey',    icon: '🔀' },
  { file: 'chart-heatmap',       name: '热力图 Heatmap',   icon: '🟥' },
  { file: 'chart-tree',          name: '树图 Tree',        icon: '🌳' },
  { file: 'chart-graph',         name: '关系图 Graph',     icon: '🕸️' },
];

let cur = 0;
const frame = document.getElementById('frame');
const typeEl = document.getElementById('type');
const idxEl = document.getElementById('idx');
const thumbs = document.getElementById('thumbs');

// 生成底部缩略按钮
charts.forEach((c, i) => {
  const btn = document.createElement('button');
  btn.textContent = c.icon + ' ' + c.name;
  btn.addEventListener('click', () => go(i));
  thumbs.appendChild(btn);
});

function go(n) {
  cur = ((n % charts.length) + charts.length) % charts.length;
  const c = charts[cur];
  frame.src = 'single-page/' + c.file + '.html';
  typeEl.textContent = c.icon + ' ' + c.name;
  idxEl.textContent = (cur + 1) + ' / ' + charts.length;
  // 更新缩略按钮状态
  thumbs.querySelectorAll('button').forEach((btn, i) => {
    btn.classList.toggle('active', i === cur);
  });
  history.replaceState(null, '', '#/' + (cur + 1));
}

document.getElementById('prev').addEventListener('click', () => go(cur - 1));
document.getElementById('next').addEventListener('click', () => go(cur + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { go(cur + 1); e.preventDefault(); }
  if (e.key === 'ArrowLeft') { go(cur - 1); e.preventDefault(); }
});

// 支持 URL hash 定位
const m = /^#\/(\d+)/.exec(location.hash || '');
if (m) go(parseInt(m[1], 10) - 1); else go(0);
</script>
</body>
</html>
